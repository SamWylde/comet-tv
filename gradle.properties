# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=true

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official

# NOTE: This project requires JDK 17 (Android Gradle Plugin 8.x). If your default
# `java` is older, either set JAVA_HOME to a JDK 17 before running ./gradlew, or
# uncomment and point the line below at your local JDK 17 install:
# org.gradle.java.home=C:\\Program Files\\Microsoft\\jdk-17.0.19.10-hotspot
